name: wiigc_fusion
description: "Orbiit — Your games. In orbit. Premium game library manager for Wii, GameCube, and retro collections."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.0.2
  http: ^1.2.2
  archive: ^3.6.1
  path_provider: ^2.0.5
  xml: ^6.5.0
  file_picker: ^8.0.0
  path: ^1.9.0
  window_manager: ^0.4.2
  vector_math: ^2.1.4
  url_launcher: ^6.3.2
  provider: ^6.1.2
  drift: ^2.23.0
  sqlite3_flutter_libs: ^0.5.0
  crypto: ^3.0.3
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  video_player: ^2.8.2
  video_player_win: ^2.0.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.23.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

dependency_overrides:
  path_provider_foundation: 2.3.2
